spring.application.name=rolemate-backend
server.port=8080
server.error.include-message=always

# ── WebSocket ──
rolemate.websocket.allowed-origins=*

# ── Supported roles (comma-separated display names) ──
rolemate.supported-roles=Backend Engineering,Frontend Engineering,Full Stack Development,Data Science,DevOps,UI/UX Design

# ── Database ──
# All values are externalized here for easy swap to Docker/container config later.
# Override these in application-dev.properties or via environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/rolemate
spring.datasource.username=turing
spring.datasource.password=turing@1950
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Flyway (schema migrations) ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Logging ──
logging.level.com.rolemate=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
