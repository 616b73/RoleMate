# Test profile: uses H2 in-memory database instead of PostgreSQL.
# No external DB needed to run tests.

spring.datasource.url=jdbc:h2:mem:rolemate-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Flyway uses H2-compatible migrations in test
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
